{% set pyproject = load_file_data("../pyproject.toml", from_recipe_dir=True) %}

package:
  name: myiagi-widget
  version: {{ pyproject.get("project").get("version") }}

source:
  git_url: https://github.com/munch-group/myiagi-widget.git

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  python_version_independent: true
  # entry_points intentionally omitted: `pip install .` above already installs
  # the myiagi console script from pyproject.toml's [project.scripts],
  # declaring it again here would clobber that same file with a duplicate.

requirements:
  host:
    - python {{ pyproject.get("project").get("requires-python") }}
    - pip
    - setuptools>=65.0
  run:  # your library dependencies
    - python {{ pyproject.get("project").get("requires-python") }}
    {% for dep in pyproject.get("project").get("dependencies") %}
    - {{ dep.lower() }}
    {% endfor %}

channels:  # channels for your library dependencies
  - conda-forge
  - sepandhaghighi  # art is only published there, not on conda-forge
  - munch-group  # steps-widget is published there, not on conda-forge

dependencies:   # keep this block with only these packages
  - anaconda-client
  - conda-build>=25.1.3 # from 25 the output file is a .conda not .tar.bz2
  - conda-verify
  - conda-package-handling
  # - conda-forge/label/python_rc::_python_rc # Dummy package to force selection of python_rc channel when channel_priority is set to strict

test:
  imports:
    - myiagi_widget

about:
  home: https://github.com/munch-group/myiagi-widget.git
  license: MIT
  dev_url: https://github.com/munch-group/myiagi-widget.git
  doc_url: https://munch-group.org/myiagi-widget
